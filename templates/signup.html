<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContextWeave — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #050a12;
  --surface:  rgba(255,255,255,0.035);
  --border:   rgba(255,255,255,0.07);
  --border-hi:rgba(0,229,192,0.35);
  --text:     #e2eaf4;
  --muted:    #5a7090;
  --accent:   #3b9eff;
  --accent2:  #00e5c0;
  --danger:   #ff4466;
  --good:     #22d98a;
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
}

.blob {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none; z-index: 0;
}
.b1 { width:500px; height:500px; background:rgba(0,229,192,0.06); top:-100px; right:-100px; }
.b2 { width:400px; height:400px; background:rgba(59,158,255,0.05); bottom:-80px; left:-80px; }

.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  margin: 20px;
  background: rgba(8,15,26,0.85);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 40px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  animation: rise 0.5s ease both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  box-shadow: 0 0 20px rgba(0,229,192,0.25);
}

.logo h1 {
  font-family: var(--mono);
  font-size: 16px; font-weight: 700;
  color: #fff; line-height: 1.2;
}

.logo p {
  font-size: 10px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;
}

h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 6px; }

.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; font-family: var(--mono);
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text); font-family: var(--sans); font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field input::placeholder { color: var(--muted); }
.field input:focus {
  border-color: var(--border-hi);
  box-shadow: 0 0 0 3px rgba(0,229,192,0.08);
}

.strength-bar-wrap {
  margin-top: 8px; height: 3px;
  background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;
}

.strength-bar {
  height: 100%; border-radius: 3px; width: 0%;
  transition: width 0.3s, background 0.3s;
}

.strength-hint {
  font-size: 11px; color: var(--muted); margin-top: 5px;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent2), #009e88);
  border: none; border-radius: 10px;
  color: #fff; font-family: var(--sans);
  font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 18px rgba(0,229,192,0.25);
  transition: box-shadow 0.2s, transform 0.15s;
}

.btn-submit:hover  { box-shadow: 0 6px 26px rgba(0,229,192,0.4); }
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  margin-top: 14px; padding: 11px 14px;
  background: rgba(255,68,102,0.08);
  border: 1px solid rgba(255,68,102,0.25);
  border-radius: 8px;
  font-size: 13px; color: var(--danger); display: none;
}

.success-msg {
  margin-top: 14px; padding: 11px 14px;
  background: rgba(34,217,138,0.08);
  border: 1px solid rgba(34,217,138,0.25);
  border-radius: 8px;
  font-size: 13px; color: var(--good); display: none;
}

.footer-link {
  text-align: center; margin-top: 22px;
  font-size: 13px; color: var(--muted);
}

.footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
.footer-link a:hover { text-decoration: underline; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <h1>ContextWeave</h1>
      <p>Behavioral Intelligence</p>
    </div>
  </div>

  <h2>Create your account</h2>
  <p class="subtitle">Start tracking your behavioral intelligence.</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 8 characters"
           autocomplete="new-password" oninput="checkStrength(this.value)">
    <div class="strength-bar-wrap">
      <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="strength-hint" id="strengthHint"></div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
  </div>

  <button class="btn-submit" id="signupBtn" onclick="doSignup()">Create Account</button>

  <div class="error-msg"   id="errMsg"></div>
  <div class="success-msg" id="okMsg"></div>

  <div class="footer-link">
    Already have an account? <a href="/login-page">Sign in</a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("cw_token")) {
    window.location.href = "/dashboard";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doSignup();
  });

  function checkStrength(val) {
    const bar  = document.getElementById("strengthBar");
    const hint = document.getElementById("strengthHint");
    let score  = 0;

    if (val.length >= 8)                     score++;
    if (/[A-Z]/.test(val))                   score++;
    if (/[0-9]/.test(val))                   score++;
    if (/[^A-Za-z0-9]/.test(val))            score++;

    const levels = [
      { pct: "0%",   color: "transparent",          label: "" },
      { pct: "25%",  color: "#ff4466",               label: "Weak" },
      { pct: "50%",  color: "#f59e0b",               label: "Fair" },
      { pct: "75%",  color: "#3b9eff",               label: "Good" },
      { pct: "100%", color: "#22d98a",               label: "Strong" },
    ];

    const level    = levels[score] || levels[0];
    bar.style.width      = level.pct;
    bar.style.background = level.color;
    hint.innerText       = val.length ? level.label : "";
    hint.style.color     = level.color;
  }

  async function doSignup() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirmPassword").value;
    const btn      = document.getElementById("signupBtn");

    document.getElementById("errMsg").style.display = "none";
    document.getElementById("okMsg").style.display  = "none";

    if (!email || !password) { showError("Please fill in all fields."); return; }
    if (password.length < 8) { showError("Password must be at least 8 characters."); return; }
    if (password !== confirm) { showError("Passwords do not match."); return; }

    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    try {
      const res  = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.detail || "Signup failed."); return; }

      const ok      = document.getElementById("okMsg");
      ok.innerText  = "✓ Account created! Redirecting to login…";
      ok.style.display = "block";

      setTimeout(() => window.location.href = "/login-page", 1800);

    } catch (e) {
      showError("Network error — is the server running?");
    } finally {
      btn.disabled  = false;
      btn.innerHTML = "Create Account";
    }
  }

  function showError(msg) {
    const el = document.getElementById("errMsg");
    el.innerText     = msg;
    el.style.display = "block";
  }
</script>
</body>
</html>
