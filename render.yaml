services:
  - type: web
    name: contextweave
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_GEMINI
        value: "false"
      - key: SECRET_KEY
        generateValue: true