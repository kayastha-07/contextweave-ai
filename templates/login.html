<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContextWeave — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #050a12;
  --surface:  rgba(255,255,255,0.035);
  --border:   rgba(255,255,255,0.07);
  --border-hi:rgba(59,158,255,0.35);
  --text:     #e2eaf4;
  --muted:    #5a7090;
  --accent:   #3b9eff;
  --accent2:  #00e5c0;
  --danger:   #ff4466;
  --good:     #22d98a;
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
}

/* ambient blobs */
.blob {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none; z-index: 0;
}
.b1 { width:500px; height:500px; background:rgba(59,158,255,0.07);  top:-150px; left:-100px; }
.b2 { width:400px; height:400px; background:rgba(0,229,192,0.05);   bottom:-100px; right:-80px; }

.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  margin: 20px;
  background: rgba(8,15,26,0.85);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 40px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  animation: rise 0.5s ease both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  box-shadow: 0 0 20px rgba(59,158,255,0.3);
}

.logo h1 {
  font-family: var(--mono);
  font-size: 16px; font-weight: 700;
  color: #fff; line-height: 1.2;
}

.logo p {
  font-size: 10px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;
}

h2 {
  font-size: 22px; font-weight: 600;
  color: #fff; margin-bottom: 6px;
}

.subtitle {
  font-size: 13px; color: var(--muted); margin-bottom: 28px;
}

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; font-family: var(--mono);
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text); font-family: var(--sans); font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field input::placeholder { color: var(--muted); }
.field input:focus {
  border-color: var(--border-hi);
  box-shadow: 0 0 0 3px rgba(59,158,255,0.08);
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #1a7de0);
  border: none; border-radius: 10px;
  color: #fff; font-family: var(--sans);
  font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 18px rgba(59,158,255,0.3);
  transition: box-shadow 0.2s, transform 0.15s;
}

.btn-submit:hover  { box-shadow: 0 6px 26px rgba(59,158,255,0.45); }
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  margin-top: 14px;
  padding: 11px 14px;
  background: rgba(255,68,102,0.08);
  border: 1px solid rgba(255,68,102,0.25);
  border-radius: 8px;
  font-size: 13px; color: var(--danger);
  display: none;
}

.footer-link {
  text-align: center; margin-top: 22px;
  font-size: 13px; color: var(--muted);
}

.footer-link a {
  color: var(--accent); text-decoration: none; font-weight: 500;
}
.footer-link a:hover { text-decoration: underline; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <h1>ContextWeave</h1>
      <p>Behavioral Intelligence</p>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access your behavioral dashboard.</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-submit" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="error-msg" id="errMsg"></div>

  <div class="footer-link" style="margin-top:12px">
    <a href="#" onclick="showForgotForm()" style="color:var(--muted);font-size:12px">Forgot password?</a>
  </div>
  <div class="footer-link">
    Don't have an account? <a href="/signup-page">Create one</a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("cw_token")) {
    window.location.href = "/dashboard";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const errMsg   = document.getElementById("errMsg");

    errMsg.style.display = "none";

    if (!email || !password) {
      showError("Please enter your email and password.");
      return;
    }

    btn.disabled   = true;
    btn.innerHTML  = '<span class="spinner"></span> Signing in…';

    try {
      const res  = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || "Login failed.");
        return;
      }

      localStorage.setItem("cw_token", data.access_token);
      window.location.href = "/dashboard";

    } catch (e) {
      showError("Network error — is the server running?");
    } finally {
      btn.disabled  = false;
      btn.innerHTML = "Sign In";
    }
  }

  function showError(msg) {
    const el = document.getElementById("errMsg");
    el.innerText     = msg;
    el.style.display = "block";
  }
</script>

<!-- Forgot Password Form -->
<div id="forgotForm" style="display:none;margin-top:20px">
  <div style="height:1px;background:var(--border);margin-bottom:20px"></div>
  <h3 style="font-size:16px;font-weight:600;color:#fff;margin-bottom:6px">Reset Password</h3>
  <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Enter your email to receive an OTP.</p>

  <div id="forgotStep1">
    <div class="field">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="you@example.com">
    </div>
    <button class="btn-submit" onclick="sendResetOTP()" style="background:linear-gradient(135deg,#00e5c0,#009e88)">Send OTP</button>
  </div>

  <div id="forgotStep2" style="display:none">
    <div class="field">
      <label>OTP (check your email)</label>
      <input type="text" id="resetOTP" placeholder="6-digit code" maxlength="6">
    </div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="resetNewPass" placeholder="Min. 8 characters">
    </div>
    <button class="btn-submit" onclick="doReset()" style="background:linear-gradient(135deg,#00e5c0,#009e88)">Reset Password</button>
  </div>

  <div class="error-msg"  id="resetErr"></div>
  <div class="error-msg"  id="resetOk"  style="background:rgba(34,217,138,0.08);border-color:rgba(34,217,138,0.25);color:#22d98a"></div>
</div>

<script>
function showForgotForm() {
  document.getElementById('forgotForm').style.display = 'block';
  document.getElementById('forgotForm').scrollIntoView({behavior:'smooth'});
}

async function sendResetOTP() {
  const email = document.getElementById('resetEmail').value.trim();
  const err   = document.getElementById('resetErr');
  err.style.display = 'none';
  if (!email) { showResetErr('Enter your email.'); return; }
  try {
    const res  = await fetch('/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    document.getElementById('forgotStep1').style.display = 'none';
    document.getElementById('forgotStep2').style.display = 'block';
    document.getElementById('resetOk').textContent = '✓ OTP sent! Check your email.';
    document.getElementById('resetOk').style.display = 'block';
  } catch(e) { showResetErr('Network error.'); }
}

async function doReset() {
  const email    = document.getElementById('resetEmail').value.trim();
  const otp      = document.getElementById('resetOTP').value.trim();
  const newPass  = document.getElementById('resetNewPass').value;
  if (!otp || !newPass) { showResetErr('Fill in all fields.'); return; }
  try {
    const res  = await fetch('/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, otp, new_password: newPass})
    });
    const data = await res.json();
    if (!res.ok) { showResetErr(data.detail || 'Reset failed.'); return; }
    document.getElementById('resetOk').textContent = '✓ Password reset! Redirecting to login…';
    setTimeout(() => location.reload(), 2000);
  } catch(e) { showResetErr('Network error.'); }
}

function showResetErr(msg) {
  const el = document.getElementById('resetErr');
  el.textContent = msg; el.style.display = 'block';
}
</script>

</body>
</html>
